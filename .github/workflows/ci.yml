name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build --workspace=packages/core

      - name: Test core
        run: npm test --workspace=packages/core

      - name: Build excel-io
        run: npm run build --workspace=packages/excel-io

      - name: Test excel-io
        run: npm test --workspace=packages/excel-io

      - name: Build sample-data
        run: npm run build --workspace=packages/sample-data

      - name: Build web-free
        run: npm run build --workspace=apps/web-free
